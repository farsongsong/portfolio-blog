<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 · Farsongsong</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Farsongsong</div>
    <div class="auth-subtitle">portfolio · login</div>

    <div th:if="${param.signup}" class="auth-success">회원가입이 완료되었습니다.</div>
    <div th:if="${errorMsg}" class="auth-error" th:text="${errorMsg}"></div>

    <form th:action="@{/auth/login}" method="post">
      <div class="form-group">
        <label class="form-label">아이디</label>
        <input name="username" type="text" class="form-control" placeholder="username" required autocomplete="username"/>
      </div>
      <div class="form-group" style="margin-bottom:24px;">
        <label class="form-label">비밀번호</label>
        <input name="password" type="password" class="form-control" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;">로그인</button>
    </form>

    <div class="auth-link">계정이 없으신가요? <a th:href="@{/auth/signup}">회원가입</a></div>
    <div style="margin-top:10px;text-align:center;">
      <a th:href="@{/}" style="font-size:0.72rem;color:var(--gray-400);">← 메인으로</a>
    </div>
  </div>
</div>
</body>
</html>
