<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>글 수정 · Farsongsong</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <div class="navbar-brand">
      <a th:href="@{/}" class="brand-name">Farsongsong</a>
      <span class="brand-dot"></span>
    </div>
    <div class="navbar-nav">
      <a th:href="@{/}" class="nav-item">Home</a>
      <a th:href="@{/post/list}" class="nav-item">Posts</a>
    </div>
    <div class="navbar-actions" style="margin-left:auto;">
      <a th:href="@{/post/{id}(id=${post.id})}" class="btn btn-outline btn-sm">← 글로 돌아가기</a>
      <form th:action="@{/auth/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-ghost btn-sm">로그아웃</button>
      </form>
    </div>
  </div>
</nav>

<main class="page-shell" style="max-width:760px;">
  <div class="page-header">
    <div class="page-overline">Admin · Edit</div>
    <h1 class="page-title">글 수정</h1>
  </div>

  <form th:action="@{/admin/update/{id}(id=${post.id})}" method="post" enctype="multipart/form-data">
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <select name="category" class="form-control" style="max-width:180px;">
        <option value="" th:selected="${post.category==null}">선택 안함</option>
        <option value="dev" th:selected="${post.category=='dev'}">개발</option>
        <option value="essay" th:selected="${post.category=='essay'}">공부</option>
        <option value="review" th:selected="${post.category=='review'}">독서</option>
        <option value="etc" th:selected="${post.category=='etc'}">기타</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">제목</label>
      <input type="text" name="title" class="form-control" th:value="${post.title}" required style="font-size:1.05rem;padding:11px 14px;"/>
    </div>
    <div class="form-group">
      <label class="form-label">대표 이미지</label>
      <div th:if="${post.imageUrl!=null}" style="margin-bottom:10px;display:flex;align-items:center;gap:12px;">
        <img th:src="${post.imageUrl}" style="height:72px;border:1px solid var(--gray-100);" alt="현재"/>
        <span style="font-size:0.72rem;color:var(--gray-400);font-family:var(--font-mono);">새 이미지 업로드 시 교체됩니다</span>
      </div>
      <div class="image-upload-zone">
        <input type="file" id="image-input" name="image" accept="image/*"/>
        <div class="image-upload-icon">↑</div>
        <div class="image-upload-text">새 이미지 업로드</div>
        <div class="image-upload-hint">JPG, PNG, GIF · 최대 10MB</div>
        <img id="image-preview" class="image-preview" alt="preview"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">내용</label>
      <div class="editor-toolbar">
        <button type="button" onclick="insertMd('**','**')"><b>B</b></button>
        <button type="button" onclick="insertMd('*','*')"><i>I</i></button>
        <button type="button" onclick="insertMd('## ','')">H2</button>
        <button type="button" onclick="insertMd('### ','')">H3</button>
        <button type="button" onclick="insertMd('> ','')">❝</button>
        <button type="button" onclick="insertMd('`','`')">code</button>
        <button type="button" onclick="insertMd('\n```\n','\n```')">```</button>
      </div>
      <textarea id="content-area" name="content" class="form-control editor-textarea" th:text="${post.content}" required></textarea>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--gray-100);">
      <a th:href="@{/post/{id}(id=${post.id})}" class="btn btn-outline">취소</a>
      <button type="submit" class="btn btn-primary">수정 완료</button>
    </div>
  </form>
</main>

<script th:src="@{/js/script.js}"></script>
<script>
function insertMd(b,a){const t=document.getElementById('content-area');const s=t.selectionStart,e=t.selectionEnd;t.value=t.value.substring(0,s)+b+t.value.substring(s,e)+a+t.value.substring(e);t.focus();t.setSelectionRange(s+b.length,e+b.length);}
</script>
</body>
</html>
