<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>오류 · Farsongsong</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
  <style>
    .error-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; text-align:center; gap:16px; }
    .error-code { font-family:var(--font-serif); font-size:6rem; font-weight:400; color:var(--gray-100); line-height:1; letter-spacing:-0.05em; }
    .error-msg  { font-size:0.9rem; color:var(--gray-400); max-width:440px; line-height:1.7; }
  </style>
</head>
<body>
<div class="error-wrap">
  <div class="error-code" th:text="${status}">500</div>
  <div class="error-msg" th:text="${message}">오류가 발생했습니다.</div>
  <a th:href="@{/}" class="btn btn-outline">홈으로 돌아가기</a>
</div>
</body>
</html>
